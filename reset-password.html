<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password – ABUAD Maintenance</title>
  <!-- Same fonts & Supabase -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brand-navy: #0B1E3D;
      --brand-gold: #C4962C;
      --gray-50: #F9FAFB; --gray-100: #F3F4F6; --gray-200: #E5E7EB;
      --gray-400: #9CA3AF; --gray-500: #6B7280; --gray-600: #4B5563;
      --success: #059669; --danger: #DC2626;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem; --space-5: 1.5rem;
      --font-body: 'DM Sans', sans-serif;
      --font-display: 'DM Serif Display', serif;
    }
    body {
      font-family: var(--font-body);
      background: var(--gray-50);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .form-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .form-group {
      margin-bottom: var(--space-4);
    }
    .form-label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: var(--space-2);
      color: var(--gray-600);
    }
    .form-control {
      width: 100%;
      padding: 0.65rem 0.75rem;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.9rem;
      transition: border 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--brand-navy);
      box-shadow: 0 0 0 3px rgba(11,30,61,0.1);
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--brand-navy);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert {
      padding: 0.65rem 0.75rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      margin-bottom: var(--space-4);
      display: none;
    }
    .alert.show { display: block; }
    .alert-success { background: #ECFDF5; color: var(--success); }
    .alert-error   { background: #FEE2E2; color: var(--danger); }
    h2 { font-family: var(--font-display); color: var(--brand-navy); margin-bottom: var(--space-4); }
    .back-link {
      display: block;
      margin-top: var(--space-4);
      text-align: center;
      font-size: 0.85rem;
      color: var(--gray-500);
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="form-card">
  <h2>Set New Password</h2>
  <div class="alert alert-success" id="update-success"></div>
  <div class="alert alert-error" id="update-error"></div>
  <div class="form-group">
    <label class="form-label" for="new-password">New Password (min. 6 characters)</label>
    <input type="password" id="new-password" class="form-control" placeholder="Enter new password" />
  </div>
  <button class="btn" id="update-btn" onclick="handleUpdatePassword()">Update Password</button>
  <a class="back-link" href="index.html">← Back to Sign In</a>
</div>

<script>
  // ══════════════════════════════
  // Supabase Config – same as main app
  // ══════════════════════════════
  const SUPABASE_URL = 'https://noqfhommfvnbmlsqlaan.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_UIYBrBTGlP7bSIWERpv7dQ_sGgayUSR';
  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function handleUpdatePassword() {
    const password = document.getElementById('new-password').value.trim();
    const errorEl = document.getElementById('update-error');
    const successEl = document.getElementById('update-success');
    errorEl.classList.remove('show');
    successEl.classList.remove('show');

    if (password.length < 6) {
      errorEl.textContent = 'Password must be at least 6 characters.';
      errorEl.classList.add('show');
      return;
    }

    const btn = document.getElementById('update-btn');
    btn.disabled = true;
    btn.textContent = 'Updating...';

    try {
      const { error } = await supabaseClient.auth.updateUser({ password });
      if (error) throw error;

      successEl.textContent = '✅ Password updated! Redirecting to login...';
      successEl.classList.add('show');

      // Sign out the temporary recovery session
      await supabaseClient.auth.signOut();
      // Redirect to main login after 2 seconds
      setTimeout(() => {
        window.location.href = 'index.html';
      }, 2000);
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.classList.add('show');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Update Password';
    }
  }

  // Listen for the PASSWORD_RECOVERY event (no need to manually parse tokens)
  supabaseClient.auth.onAuthStateChange((event, session) => {
    if (event === 'PASSWORD_RECOVERY') {
      // Successfully verified – the user is now signed in with a recovery token
      console.log('Password recovery detected');
      // The form is already shown by default; we could hide a loading state if needed
    }
  });
</script>
</body>
</html>
